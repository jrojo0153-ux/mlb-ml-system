name: Ejecucion Diaria Modelo MLB

on:
  schedule:
    # Se ejecuta todos los días a las 14:00 UTC (Ajusta según tu zona horaria)
    - cron: '0 14 * * *'
  workflow_dispatch: # Esto permite activar el modelo manualmente con un botón

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar librerias de Machine Learning
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Predicciones MLB
      run: python main.py
