name: Ejecucion Diaria Modelo MLB

on:
  schedule:
    # Se ejecuta automáticamente todos los días a las 14:00 UTC
    - cron: '0 14 * * *'
  workflow_dispatch: # Permite activar el modelo manualmente con un botón

# Permisos necesarios para que GitHub Actions pueda guardar el archivo CSV en tu repositorio
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar librerias de Machine Learning
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Predicciones MLB
      run: python main.py

    - name: Guardar predicciones en el repositorio
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add predicciones_mlb.csv historico_predicciones.csv 2>/dev/null || true
        git commit -m "Actualizacion automatica de predicciones MLB [skip ci]" || echo "No hay cambios para guardar"
        git push
