name: MLB ML System Daily Pipeline

on:
  schedule:
    # Se ejecuta de forma automática todos los días a las 11:00 UTC (5:00 AM hora de CDMX / 7:00 AM EST)
    - cron: '0 11 * * *'
  workflow_dispatch:
    # Permite que puedas pulsar un botón para ejecutarlo cuando tú quieras

permissions:
  contents: write

jobs:
  run-pipeline:
    runs_on: ubuntu-latest

    steps:
      - name: Descargar Código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Entrenar Modelo
        run: |
          python train.py

      - name: Generar Predicciones de Hoy
        run: |
          python main.py > PREDICCIONES.md

      - name: Guardar Resultados en GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add mlb_model.pkl PREDICCIONES.md
          git commit -m "Predicciones actualizadas automáticamente" || echo "Sin cambios"
          git push
